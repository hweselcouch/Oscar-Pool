<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Pool 2026</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 3px solid #c0c0c0;
    padding: 1.2rem;
    text-align: center;
  }
  header h1 {
    font-size: 2rem;
    color: #c0c0c0;
    letter-spacing: 2px;
  }
  header h1 span { font-size: 1.2rem; color: #aaa; }
  nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
  }
  nav button {
    background: transparent;
    color: #c0c0c0;
    border: 1px solid #c0c0c0;
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
    transition: all 0.2s;
  }
  nav button:hover, nav button.active {
    background: #c0c0c0;
    color: #1a1a2e;
  }
  .page { display: none; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  .page.visible { display: block; }
  .join-box {
    text-align: center;
    margin-top: 3rem;
  }
  .join-box input {
    font-size: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 6px;
    border: 2px solid #c0c0c0;
    background: #16213e;
    color: #eee;
    width: 100%;
    max-width: 320px;
    font-family: inherit;
  }
  .join-box button {
    display: block;
    margin: 1rem auto 0;
    font-size: 1.1rem;
    padding: 0.8rem 2.5rem;
    background: #c0c0c0;
    color: #1a1a2e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
  }
  .category-card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 1rem;
  }
  .category-card h3 {
    color: #c0c0c0;
    margin-bottom: 0.6rem;
    font-size: 1.05rem;
  }
  .category-card .points-badge {
    font-size: 0.8rem;
    color: #aaa;
    font-weight: normal;
  }
  .nominees {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .nominee-btn {
    background: #1a1a2e;
    border: 1px solid #444;
    color: #ddd;
    padding: 0.55rem 0.8rem;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    transition: all 0.15s;
    font-family: inherit;
  }
  .nominee-btn:hover { border-color: #c0c0c0; color: #fff; }
  .nominee-btn.selected {
    background: #c0c0c0;
    color: #1a1a2e;
    border-color: #c0c0c0;
    font-weight: bold;
  }
  .nominee-btn.correct {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
  }
  .nominee-btn.wrong {
    opacity: 0.4;
  }
  .nominee-btn.is-winner {
    border-color: #2ecc71;
    box-shadow: 0 0 0 2px #2ecc71;
  }
  #submitPicks {
    display: block;
    width: 100%;
    padding: 1rem;
    font-size: 1.2rem;
    background: #c0c0c0;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin: 1.5rem 0;
    font-family: inherit;
  }
  #submitPicks:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #editPicks {
    display: none;
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    background: transparent;
    color: #c0c0c0;
    border: 2px solid #c0c0c0;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 1.5rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  #editPicks:hover {
    background: #c0c0c0;
    color: #1a1a2e;
  }
  .locked-banner {
    display: none;
    text-align: center;
    background: #e74c3c;
    color: #fff;
    padding: 0.8rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-weight: bold;
    font-size: 0.95rem;
  }
  .locked-banner.visible {
    display: block;
  }
  .pick-status {
    text-align: center;
    color: #aaa;
    margin-bottom: 1rem;
  }
  .leaderboard-stats {
    text-align: center;
    color: #aaa;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }
  .podium-container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0.5rem;
    margin-bottom: 2rem;
    padding: 1rem 0;
    min-height: 220px;
  }
  .podium-spot {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30%;
    max-width: 160px;
  }
  .podium-name {
    font-size: 0.95rem;
    font-weight: bold;
    color: #eee;
    margin-bottom: 0.3rem;
    text-align: center;
    word-break: break-word;
  }
  .podium-score {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 0.4rem;
  }
  .podium-bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 0.5rem;
    transition: height 0.8s ease;
  }
  .podium-bar .podium-rank {
    font-size: 1.5rem;
    font-weight: bold;
  }
  .podium-first .podium-score { color: #c0c0c0; }
  .podium-first .podium-bar {
    background: linear-gradient(to top, #707070, #c0c0c0);
    min-height: 120px;
  }
  .podium-first .podium-rank { color: #1a1a2e; }
  .podium-second .podium-score { color: #a0a0a0; }
  .podium-second .podium-bar {
    background: linear-gradient(to top, #505050, #a0a0a0);
    min-height: 85px;
  }
  .podium-second .podium-rank { color: #1a1a2e; }
  .podium-third .podium-score { color: #cd7f32; }
  .podium-third .podium-bar {
    background: linear-gradient(to top, #6b3e1f, #cd7f32);
    min-height: 60px;
  }
  .podium-third .podium-rank { color: #1a1a2e; }
  .podium-empty .podium-bar {
    background: #16213e;
    border: 1px dashed #333;
    min-height: 40px;
  }
  .podium-empty .podium-name { color: #555; }
  .podium-empty .podium-score { color: #555; }
  .score-bars {
    margin-bottom: 2rem;
  }
  .score-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .score-bar-name {
    width: 100px;
    font-size: 0.85rem;
    color: #ccc;
    text-align: right;
    padding-right: 0.8rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .score-bar-track {
    flex: 1;
    height: 28px;
    background: #1a1a2e;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    border: 1px solid #333;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.8s ease;
    display: flex;
    align-items: center;
    padding-left: 0.6rem;
    font-size: 0.8rem;
    font-weight: bold;
    color: #1a1a2e;
    min-width: 0;
  }
  .score-bar-fill-first {
    background: linear-gradient(to right, #707070, #c0c0c0);
  }
  .score-bar-fill-second {
    background: linear-gradient(to right, #505050, #a0a0a0);
  }
  .score-bar-fill-third {
    background: linear-gradient(to right, #6b3e1f, #cd7f32);
  }
  .score-bar-fill-rest {
    background: linear-gradient(to right, #2a2a4e, #3a3a5e);
    color: #ddd;
  }
  .score-bar-value {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    color: #aaa;
  }
  .section-label {
    text-align: center;
    color: #c0c0c0;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 1rem;
    margin-top: 1.5rem;
  }
  .leader-row {
    display: flex;
    align-items: center;
    background: #16213e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.6rem;
    transition: all 0.3s;
    cursor: pointer;
    flex-wrap: wrap;
  }
  .leader-row.expanded {
    margin-bottom: 0;
    border-radius: 8px 8px 0 0;
  }
  .leader-row.first { border-color: #c0c0c0; background: linear-gradient(135deg, #16213e, #222238); }
  .leader-row.second { border-color: #a0a0a0; }
  .leader-row.third { border-color: #cd7f32; }
  .leader-rank {
    font-size: 1.5rem;
    font-weight: bold;
    width: 2.5rem;
    text-align: center;
    color: #c0c0c0;
  }
  .leader-name {
    flex: 1;
    font-size: 1.1rem;
    margin-left: 0.8rem;
  }
  .leader-score {
    font-size: 1.4rem;
    font-weight: bold;
    color: #c0c0c0;
  }
  .leader-correct {
    font-size: 0.8rem;
    color: #aaa;
    margin-left: 0.5rem;
    min-width: 60px;
    text-align: right;
  }
  .leader-expand-hint {
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: #666;
    margin-top: 0.3rem;
  }
  .leader-details {
    display: none;
    background: #131b2e;
    border: 1px solid #333;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.6rem;
  }
  .leader-details.visible {
    display: block;
  }
  .leader-details-first { border-color: #c0c0c0; }
  .leader-details-second { border-color: #a0a0a0; }
  .leader-details-third { border-color: #cd7f32; }
  .pick-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid #1e2a42;
    font-size: 0.9rem;
  }
  .pick-row:last-child {
    border-bottom: none;
  }
  .pick-category {
    color: #aaa;
    flex: 0 0 40%;
  }
  .pick-choice {
    flex: 1;
    text-align: right;
    color: #ddd;
  }
  .pick-points {
    flex: 0 0 50px;
    text-align: right;
    font-weight: bold;
  }
  .pick-correct .pick-choice {
    color: #2ecc71;
  }
  .pick-correct .pick-points {
    color: #2ecc71;
  }
  .pick-wrong .pick-choice {
    color: #e74c3c;
    text-decoration: line-through;
    opacity: 0.6;
  }
  .pick-wrong .pick-points {
    color: #e74c3c;
  }
  .pick-pending .pick-choice {
    color: #888;
  }
  .pick-pending .pick-points {
    color: #444;
  }
  .trophy { font-size: 1.5rem; }
  .admin-login { text-align: center; margin: 2rem 0; }
  .admin-login input {
    padding: 0.6rem 1rem;
    font-size: 1rem;
    border-radius: 6px;
    border: 2px solid #c0c0c0;
    background: #16213e;
    color: #eee;
    font-family: inherit;
  }
  .admin-login button {
    padding: 0.6rem 1.5rem;
    background: #c0c0c0;
    color: #1a1a2e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    margin-left: 0.5rem;
    font-family: inherit;
  }
  .admin-card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 0.8rem;
  }
  .admin-card h3 { color: #c0c0c0; margin-bottom: 0.5rem; }
  .admin-card .nominee-btn.winner-set {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
  }
  .admin-card .winner-label {
    color: #2ecc71;
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }
  .lock-btn {
    display: block;
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 1.5rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .lock-btn-lock {
    background: #e74c3c;
    color: #fff;
  }
  .lock-btn-lock:hover {
    background: #c0392b;
  }
  .lock-btn-unlock {
    background: #2ecc71;
    color: #fff;
  }
  .lock-btn-unlock:hover {
    background: #27ae60;
  }
  .lock-status {
    text-align: center;
    padding: 0.6rem;
    border-radius: 6px;
    margin-bottom: 1rem;
    font-weight: bold;
    font-size: 0.9rem;
  }
  .lock-status-locked {
    background: #e74c3c;
    color: #fff;
  }
  .lock-status-unlocked {
    background: #2ecc71;
    color: #fff;
  }
  .no-players {
    text-align: center;
    color: #888;
    padding: 3rem 1rem;
    font-size: 1.1rem;
  }
</style>
</head>
<body>
<header>
  <h1>Oscar Pool 2026 <span>&#127942;</span></h1>
  <nav>
    <button class="active" data-page="join">Join</button>
    <button data-page="picks">My Picks</button>
    <button data-page="leaderboard">Leaderboard</button>
    <button data-page="admin">Admin</button>
  </nav>
</header>
<div id="page-join" class="page visible">
  <div class="join-box">
    <h2 style="color:#c0c0c0; margin-bottom:1.5rem;">Enter Your Name</h2>
    <input type="text" id="playerName" placeholder="Your name" autocomplete="off" />
    <button id="joinBtn">Join the Pool</button>
    <p style="color:#666; margin-top:1rem; font-size:0.9rem;" id="joinStatus"></p>
  </div>
</div>
<div id="page-picks" class="page">
  <div class="locked-banner" id="lockedBanner">Picks are locked! The ceremony has started.</div>
  <p class="pick-status" id="pickStatus">Select one nominee per category</p>
  <button id="editPicks">Edit My Picks</button>
  <div id="categoriesList"></div>
  <button id="submitPicks" disabled>Submit My Picks</button>
</div>
<div id="page-leaderboard" class="page">
  <h2 style="color:#c0c0c0; text-align:center; margin-bottom:0.5rem;">Leaderboard</h2>
  <p class="leaderboard-stats" id="lbStats"></p>
  <div id="podium"></div>
  <div id="scoreBars"></div>
  <div class="section-label" id="detailsLabel"></div>
  <div id="leaderboardList"></div>
</div>
<div id="page-admin" class="page">
  <h2 style="color:#c0c0c0; text-align:center; margin-bottom:1rem;">Admin - Set Winners</h2>
  <div class="admin-login" id="adminLogin">
    <input type="password" id="adminKey" placeholder="Admin key" />
    <button id="adminLoginBtn">Unlock</button>
  </div>
  <div id="adminPanel" style="display:none;">
    <div id="lockStatus"></div>
    <button id="lockBtn" class="lock-btn"></button>
    <div id="adminCategories"></div>
  </div>
</div>
<script>
var socket = io();
var categories = [];
var currentPicks = {};
var currentName = '';
var winners = {};
var adminKey = '';
var isSubmitted = false;
var expandedPlayer = null;
var picksLocked = false;
 
document.querySelectorAll('nav button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
    document.getElementById('page-' + btn.dataset.page).classList.add('visible');
  });
});
 
function showPage(name) {
  document.querySelectorAll('nav button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.page === name);
  });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
  document.getElementById('page-' + name).classList.add('visible');
}
 
document.getElementById('joinBtn').addEventListener('click', joinPool);
document.getElementById('playerName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') joinPool();
});
 
function joinPool() {
  var name = document.getElementById('playerName').value.trim();
  if (!name) return;
  currentName = name;
  document.getElementById('joinStatus').textContent = 'Welcome, ' + name + '!';
  renderCategories();
  showPage('picks');
}
 
document.getElementById('editPicks').addEventListener('click', function() {
  if (picksLocked) {
    alert('Picks are locked! The ceremony has started.');
    return;
  }
  isSubmitted = false;
  renderCategories();
});
 
function renderCategories() {
  var container = document.getElementById('categoriesList');
  container.innerHTML = '';
  var banner = document.getElementById('lockedBanner');
  var editBtn = document.getElementById('editPicks');
  var submitBtn = document.getElementById('submitPicks');
 
  if (picksLocked) {
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
 
  if (isSubmitted && !picksLocked) {
    editBtn.style.display = 'block';
  } else {
    editBtn.style.display = 'none';
  }
 
  categories.forEach(function(cat) {
    var card = document.createElement('div');
    card.className = 'category-card';
    var winnerNominee = winners[cat.id];
    card.innerHTML =
      '<h3>' + cat.name + ' <span class="points-badge">(' + cat.points + ' pt' + (cat.points > 1 ? 's' : '') + ')</span></h3>' +
      '<div class="nominees">' +
      cat.nominees.map(function(n) {
        var cls = 'nominee-btn';
        if (currentPicks[cat.id] === n) cls += ' selected';
        if (winnerNominee) {
          if (n === winnerNominee) cls += ' is-winner';
          if (currentPicks[cat.id] === n && n === winnerNominee) cls += ' correct';
          else if (currentPicks[cat.id] === n && n !== winnerNominee) cls += ' wrong';
        }
        var disabled = isSubmitted ? 'disabled' : '';
        return '<button class="' + cls + '" data-cat="' + cat.id + '" data-nominee="' + n + '" ' + disabled + '>' + n + (winnerNominee === n ? ' WINNER' : '') + '</button>';
      }).join('') +
      '</div>';
    container.appendChild(card);
  });
 
  if (!isSubmitted) {
    container.querySelectorAll('.nominee-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var catId = btn.dataset.cat;
        currentPicks[catId] = btn.dataset.nominee;
        renderCategories();
        updatePickStatus();
      });
    });
  }
 
  updatePickStatus();
}
 
function updatePickStatus() {
  var picked = Object.keys(currentPicks).length;
  var total = categories.length;
  var status = document.getElementById('pickStatus');
  var btn = document.getElementById('submitPicks');
 
  if (isSubmitted) {
    status.textContent = 'Your picks are locked in, ' + currentName + '!';
    btn.style.display = 'none';
  } else if (picksLocked) {
    status.textContent = 'Picks are locked for the ceremony.';
    btn.style.display = 'none';
  } else {
    status.textContent = picked + ' of ' + total + ' categories picked';
    btn.disabled = picked < total;
    btn.style.display = 'block';
    btn.textContent = picked < total ? 'Pick all ' + total + ' categories to submit' : 'Submit My Picks';
  }
}
 
document.getElementById('submitPicks').addEventListener('click', function() {
  if (!currentName) { showPage('join'); return; }
  if (picksLocked) {
    alert('Picks are locked! The ceremony has started.');
    return;
  }
  socket.emit('submitPicks', { name: currentName, picks: currentPicks });
  isSubmitted = true;
  renderCategories();
  showPage('leaderboard');
});
 
function getMaxPossibleScore() {
  var total = 0;
  categories.forEach(function(cat) { total += cat.points; });
  return total;
}
 
function renderPodium(leaderboard) {
  var container = document.getElementById('podium');
  if (!leaderboard || leaderboard.length === 0) {
    container.innerHTML = '';
    return;
  }
  var maxScore = getMaxPossibleScore();
  if (maxScore === 0) maxScore = 1;
  var first = leaderboard[0] || null;
  var second = leaderboard[1] || null;
  var third = leaderboard[2] || null;
 
  function spotHtml(player, place) {
    var placeClass = place === 1 ? 'podium-first' : place === 2 ? 'podium-second' : 'podium-third';
    var label = place === 1 ? '1st' : place === 2 ? '2nd' : '3rd';
    var emoji = place === 1 ? '&#127942;' : place === 2 ? '&#129352;' : '&#129353;';
    if (!player) {
      return '<div class="podium-spot podium-empty">' +
        '<div class="podium-name">---</div>' +
        '<div class="podium-score">-</div>' +
        '<div class="podium-bar"><div class="podium-rank">' + label + '</div></div>' +
        '</div>';
    }
    var heightPercent = Math.max(20, (player.score / maxScore) * 100);
    var barHeight = place === 1 ? Math.max(120, heightPercent * 1.5) : place === 2 ? Math.max(85, heightPercent * 1.2) : Math.max(60, heightPercent);
    return '<div class="podium-spot ' + placeClass + '">' +
      '<div class="podium-name">' + player.name + '</div>' +
      '<div class="podium-score">' + emoji + ' ' + player.score + ' pts</div>' +
      '<div class="podium-bar" style="height:' + barHeight + 'px"><div class="podium-rank">' + label + '</div></div>' +
      '</div>';
  }
 
  container.innerHTML = '<div class="podium-container">' +
    spotHtml(second, 2) +
    spotHtml(first, 1) +
    spotHtml(third, 3) +
    '</div>';
}
 
function renderScoreBars(leaderboard) {
  var container = document.getElementById('scoreBars');
  if (!leaderboard || leaderboard.length === 0) {
    container.innerHTML = '';
    return;
  }
  var maxScore = getMaxPossibleScore();
  if (maxScore === 0) maxScore = 1;
  var html = '<div class="score-bars">';
  leaderboard.forEach(function(p, i) {
    var percent = maxScore > 0 ? (p.score / maxScore) * 100 : 0;
    var fillClass = i === 0 ? 'score-bar-fill-first' : i === 1 ? 'score-bar-fill-second' : i === 2 ? 'score-bar-fill-third' : 'score-bar-fill-rest';
    var isMe = p.name === currentName ? ' (you)' : '';
    html += '<div class="score-bar-row">' +
      '<div class="score-bar-name">' + p.name + isMe + '</div>' +
      '<div class="score-bar-track">' +
      '<div class="score-bar-fill ' + fillClass + '" style="width:' + Math.max(percent, 2) + '%">' +
      (percent > 15 ? p.score + ' pts' : '') +
      '</div>' +
      (percent <= 15 ? '<span class="score-bar-value">' + p.score + ' pts</span>' : '') +
      '</div>' +
      '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}
 
function renderLeaderboard(leaderboard, info) {
  var container = document.getElementById('leaderboardList');
  var stats = document.getElementById('lbStats');
  var detailsLabel = document.getElementById('detailsLabel');
  if (info) {
    stats.textContent = info.playerCount + ' player' + (info.playerCount !== 1 ? 's' : '') + ' | ' + info.categoriesAnnounced + ' of ' + info.totalCategories + ' winners announced';
  }
  renderPodium(leaderboard);
  renderScoreBars(leaderboard);
  if (!leaderboard || leaderboard.length === 0) {
    container.innerHTML = '<div class="no-players">No players yet - share the link with friends!</div>';
    detailsLabel.textContent = '';
    return;
  }
  detailsLabel.textContent = 'Tap a player to see their picks';
  var html = '';
  leaderboard.forEach(function(p, i) {
    var rankClass = i === 0 ? 'first' : i === 1 ? 'second' : i === 2 ? 'third' : '';
    var detailsClass = i === 0 ? 'leader-details-first' : i === 1 ? 'leader-details-second' : i === 2 ? 'leader-details-third' : '';
    var trophy = i === 0 ? '<span class="trophy">&#127942;</span>' : i === 1 ? '<span class="trophy">&#129352;</span>' : i === 2 ? '<span class="trophy">&#129353;</span>' : '';
    var isMe = p.name === currentName ? ' (you)' : '';
    var isExpanded = expandedPlayer === p.name;
    html += '<div class="leader-row ' + rankClass + (isExpanded ? ' expanded' : '') + '" data-player="' + p.name + '">' +
      '<div class="leader-rank">' + (trophy || (i + 1)) + '</div>' +
      '<div class="leader-name">' + p.name + isMe + '</div>' +
      '<div class="leader-score">' + p.score + '</div>' +
      '<div class="leader-correct">' + p.correct + '/' + p.total + ' right</div>' +
      '<div class="leader-expand-hint">' + (isExpanded ? 'tap to collapse' : 'tap to see picks') + '</div>' +
      '</div>';
    html += '<div class="leader-details ' + detailsClass + (isExpanded ? ' visible' : '') + '">';
    categories.forEach(function(cat) {
      var pick = p.picks[cat.id];
      var winner = winners[cat.id];
      var rowClass = 'pick-row';
      var pointsText = '';
      if (!pick) {
        rowClass += ' pick-pending';
        pointsText = '-';
      } else if (!winner) {
        rowClass += ' pick-pending';
        pointsText = '?';
      } else if (pick === winner) {
        rowClass += ' pick-correct';
        pointsText = '+' + cat.points;
      } else {
        rowClass += ' pick-wrong';
        pointsText = '0';
      }
      html += '<div class="' + rowClass + '">' +
        '<div class="pick-category">' + cat.name + '</div>' +
        '<div class="pick-choice">' + (pick || 'no pick') + '</div>' +
        '<div class="pick-points">' + pointsText + '</div>' +
        '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.leader-row').forEach(function(row) {
    row.addEventListener('click', function() {
      var playerName = row.dataset.player;
      if (expandedPlayer === playerName) {
        expandedPlayer = null;
      } else {
        expandedPlayer = playerName;
      }
      renderLeaderboard(leaderboard, info);
    });
  });
}
 
document.getElementById('adminLoginBtn').addEventListener('click', function() {
  adminKey = document.getElementById('adminKey').value;
  document.getElementById('adminLogin').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  renderAdmin();
});
 
document.getElementById('lockBtn').addEventListener('click', function() {
  if (picksLocked) {
    socket.emit('unlockPicks', { adminKey: adminKey });
  } else {
    socket.emit('lockPicks', { adminKey: adminKey });
  }
});
 
function renderAdmin() {
  var lockStatus = document.getElementById('lockStatus');
  var lockBtn = document.getElementById('lockBtn');
 
  if (picksLocked) {
    lockStatus.className = 'lock-status lock-status-locked';
    lockStatus.textContent = 'Picks are LOCKED - nobody can submit or change picks';
    lockBtn.className = 'lock-btn lock-btn-unlock';
    lockBtn.textContent = 'Unlock Picks';
  } else {
    lockStatus.className = 'lock-status lock-status-unlocked';
    lockStatus.textContent = 'Picks are OPEN - players can still submit and edit';
    lockBtn.className = 'lock-btn lock-btn-lock';
    lockBtn.textContent = 'Lock All Picks';
  }
 
  var panel = document.getElementById('adminCategories');
  panel.innerHTML = categories.map(function(cat) {
    var w = winners[cat.id];
    return '<div class="admin-card">' +
      '<h3>' + cat.name + (w ? ' &#10003;' : '') + '</h3>' +
      '<div class="nominees">' +
      cat.nominees.map(function(n) {
        var cls = 'nominee-btn';
        if (w === n) cls += ' winner-set';
        return '<button class="' + cls + '" onclick="setWinner(\'' + cat.id + '\', \'' + n.replace(/'/g, "\\'") + '\')">' + n + '</button>';
      }).join('') +
      '</div>' +
      (w ? '<div class="winner-label">Winner: ' + w + '</div>' : '') +
      '</div>';
  }).join('');
}
 
function setWinner(catId, nominee) {
  socket.emit('setWinner', { categoryId: catId, nominee: nominee, adminKey: adminKey });
}
 
var lastLeaderboard = null;
var lastInfo = null;
 
socket.on('init', function(data) {
  categories = data.categories;
  winners = data.winners;
  picksLocked = data.picksLocked;
  if (currentName && data.players[currentName]) {
    currentPicks = data.players[currentName].picks;
    isSubmitted = true;
  }
  lastInfo = {
    playerCount: Object.keys(data.players).length,
    categoriesAnnounced: Object.keys(data.winners).length,
    totalCategories: categories.length
  };
  lastLeaderboard = data.leaderboard;
  renderCategories();
  renderLeaderboard(data.leaderboard, lastInfo);
  renderAdmin();
});
 
socket.on('stateUpdate', function(data) {
  winners = data.winners;
  picksLocked = data.picksLocked;
  lastLeaderboard = data.leaderboard;
  lastInfo = data;
  renderLeaderboard(data.leaderboard, data);
  renderCategories();
  renderAdmin();
});
 
socket.on('picksError', function(msg) {
  alert(msg);
});
 
socket.on('adminError', function(msg) {
  alert('Admin error: ' + msg);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Pool 2026</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(to bottom, #1a1008, #3d2b1f) fixed;
    color: #eee;
    min-height: 100vh;
  }
 
  header {
    background: linear-gradient(135deg, #1a1008 0%, #2a1a0e 100%);
    border-bottom: 3px solid #d4a843;
    padding: 1.2rem;
    text-align: center;
  }
 
  header h1 {
    font-size: 2rem;
    color: #d4a843;
    letter-spacing: 2px;
  }
 
  header h1 span { font-size: 1.2rem; color: #aaa; }
 
  nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
  }
 
  nav button {
    background: transparent;
    color: #d4a843;
    border: 1px solid #d4a843;
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
    transition: all 0.2s;
  }
 
  nav button:hover, nav button.active {
    background: #d4a843;
    color: #1a1008;
  }
 
  .page { display: none; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  .page.visible { display: block; }
 
  .join-box {
    text-align: center;
    margin-top: 3rem;
  }
 
  .join-box input {
    font-size: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 6px;
    border: 2px solid #d4a843;
    background: #1a1008;
    color: #eee;
    width: 100%;
    max-width: 320px;
    font-family: inherit;
  }
 
  .join-box button {
    display: block;
    margin: 1rem auto 0;
    font-size: 1.1rem;
    padding: 0.8rem 2.5rem;
    background: #d4a843;
    color: #1a1008;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
  }
 
  .category-card {
    background: rgba(22, 14, 6, 0.8);
    border: 1px solid #3a2a1a;
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 1rem;
  }
 
  .category-card h3 {
    color: #d4a843;
    margin-bottom: 0.6rem;
    font-size: 1.05rem;
  }
 
  .category-card .points-badge {
    font-size: 0.8rem;
    color: #aaa;
    font-weight: normal;
  }
 
  .nominees {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
 
  .nominee-btn {
    background: #1a1008;
    border: 1px solid #3a2a1a;
    color: #ddd;
    padding: 0.55rem 0.8rem;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    transition: all 0.15s;
    font-family: inherit;
  }
 
  .nominee-btn:hover { border-color: #d4a843; color: #fff; }
  .nominee-btn.selected {
    background: #d4a843;
    color: #1a1008;
    border-color: #d4a843;
    font-weight: bold;
  }
 
  .nominee-btn.correct {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
  }
 
  .nominee-btn.wrong {
    opacity: 0.4;
  }
 
  .nominee-btn.is-winner {
    border-color: #2ecc71;
    box-shadow: 0 0 0 2px #2ecc71;
  }
 
  #submitPicks {
    display: block;
    width: 100%;
    padding: 1rem;
    font-size: 1.2rem;
    background: #d4a843;
    color: #1a1008;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin: 1.5rem 0;
    font-family: inherit;
  }
 
  #submitPicks:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
 
  .pick-status {
    text-align: center;
    color: #aaa;
    margin-bottom: 1rem;
  }
 
  .leaderboard-stats {
    text-align: center;
    color: #aaa;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }
 
  /* PODIUM */
  .podium-container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0.5rem;
    margin-bottom: 2rem;
    padding: 1rem 0;
    min-height: 220px;
  }
 
  .podium-spot {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30%;
    max-width: 160px;
  }
 
  .podium-name {
    font-size: 0.95rem;
    font-weight: bold;
    color: #eee;
    margin-bottom: 0.3rem;
    text-align: center;
    word-break: break-word;
  }
 
  .podium-score {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 0.4rem;
  }
 
  .podium-bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 0.5rem;
    transition: height 0.8s ease;
    position: relative;
  }
 
  .podium-bar .podium-rank {
    font-size: 1.5rem;
    font-weight: bold;
  }
 
  .podium-first .podium-score { color: #d4a843; }
  .podium-first .podium-bar {
    background: linear-gradient(to top, #8a6d1b, #d4a843);
    min-height: 120px;
  }
  .podium-first .podium-rank { color: #1a1008; }
 
  .podium-second .podium-score { color: #c0c0c0; }
  .podium-second .podium-bar {
    background: linear-gradient(to top, #606060, #c0c0c0);
    min-height: 85px;
  }
  .podium-second .podium-rank { color: #1a1008; }
 
  .podium-third .podium-score { color: #cd7f32; }
  .podium-third .podium-bar {
    background: linear-gradient(to top, #6b3e1f, #cd7f32);
    min-height: 60px;
  }
  .podium-third .podium-rank { color: #1a1008; }
 
  .podium-empty .podium-bar {
    background: #2a1a0e;
    border: 1px dashed #3a2a1a;
    min-height: 40px;
  }
 
  .podium-empty .podium-name {
    color: #555;
  }
 
  .podium-empty .podium-score {
    color: #555;
  }
 
  /* SCORE BARS */
  .score-bars {
    margin-bottom: 2rem;
  }
 
  .score-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.5rem;
  }
 
  .score-bar-name {
    width: 100px;
    font-size: 0.85rem;
    color: #ccc;
    text-align: right;
    padding-right: 0.8rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
 
  .score-bar-track {
    flex: 1;
    height: 28px;
    background: #1a1008;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    border: 1px solid #3a2a1a;
  }
 
  .score-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.8s ease;
    display: flex;
    align-items: center;
    padding-left: 0.6rem;
    font-size: 0.8rem;
    font-weight: bold;
    color: #1a1008;
    min-width: 0;
  }
 
  .score-bar-fill-first {
    background: linear-gradient(to right, #8a6d1b, #d4a843);
  }
 
  .score-bar-fill-second {
    background: linear-gradient(to right, #707070, #c0c0c0);
  }
 
  .score-bar-fill-third {
    background: linear-gradient(to right, #6b3e1f, #cd7f32);
  }
 
  .score-bar-fill-rest {
    background: linear-gradient(to right, #3a2a1a, #5a4530);
    color: #ddd;
  }
 
  .score-bar-value {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    color: #aaa;
  }
 
  /* LEADERBOARD LIST */
  .leader-row {
    display: flex;
    align-items: center;
    background: rgba(22, 14, 6, 0.8);
    border: 1px solid #3a2a1a;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.6rem;
    transition: all 0.3s;
    cursor: pointer;
    flex-wrap: wrap;
  }
 
  .leader-row.expanded {
    margin-bottom: 0;
    border-radius: 8px 8px 0 0;
  }
 
  .leader-row.first { border-color: #d4a843; background: linear-gradient(135deg, rgba(22,14,6,0.8), rgba(42,26,8,0.9)); }
  .leader-row.second { border-color: #aaa; }
  .leader-row.third { border-color: #cd7f32; }
 
  .leader-rank {
    font-size: 1.5rem;
    font-weight: bold;
    width: 2.5rem;
    text-align: center;
    color: #d4a843;
  }
 
  .leader-name {

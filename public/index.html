<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Pool 2026</title>

  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {

    background: #0d0d0d;
    color: #eee;
    min-height: 100vh;
  }
 
  header {
    background: linear-gradient(135deg, #1a0a0a 0%, #2a0a0a 100%);
    border-bottom: 3px solid #d4af37;
    padding: 1.2rem;

  }
 
  header h1 {

    color: #d4af37;
    letter-spacing: 2px;
  }
 
  header h1 span { font-size: 1.2rem; color: #aaa; }
 
  nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
  }
 
  nav button {
    background: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
    transition: all 0.2s;
  }
 
  nav button:hover, nav button.active {
    background: #d4af37;
    color: #0d0d0d;
  }
 
  .page { display: none; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  .page.visible { display: block; }
 
  .join-box {
    text-align: center;
    margin-top: 3rem;
  }
 
  .join-box input {

    padding: 0.8rem 1rem;
    border-radius: 6px;
    border: 2px solid #d4af37;
    background: #1a1010;
    color: #eee;
    width: 100%;
    max-width: 320px;
    font-family: inherit;
  }
 
  .join-box button {
    display: block;
    margin: 1rem auto 0;
    font-size: 1.1rem;
    padding: 0.8rem 2.5rem;
    background: #c41e3a;
    color: #fff;

  .join-box button:hover {

  }
 
  .category-card {

    border: 1px solid #3a1a1a;
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 1rem;
  }
 
  .category-card h3 {
    color: #d4af37;
    margin-bottom: 0.6rem;
    font-size: 1.05rem;
  }
 
  .category-card .points-badge {
    font-size: 0.8rem;
    color: #aaa;
    font-weight: normal;
  }
 
  .nominees {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
 
  .nominee-btn {
    background: #0d0d0d;
    border: 1px solid #3a1a1a;
    color: #ddd;
    padding: 0.55rem 0.8rem;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
    font-size: 0.95rem;
    transition: all 0.15s;
    font-family: inherit;
  }
 
  .nominee-btn:hover { border-color: #c41e3a; color: #fff; }
  .nominee-btn.selected {
    background: #c41e3a;
    color: #fff;
    border-color: #c41e3a;
    font-weight: bold;
  }
 
  .nominee-btn.correct {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
  }
 
  .nominee-btn.wrong {
    opacity: 0.4;
  }
 
  .nominee-btn.is-winner {
    border-color: #2ecc71;
    box-shadow: 0 0 0 2px #2ecc71;
  }
 
  #submitPicks {
    display: block;
    width: 100%;
    padding: 1rem;
    font-size: 1.2rem;
    background: #c41e3a;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin: 1.5rem 0;
    font-family: inherit;
  }
 
  #submitPicks:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
 
  .pick-status {
    text-align: center;
    color: #aaa;
    margin-bottom: 1rem;
  }
 
  .leaderboard-stats {
    text-align: center;
    color: #aaa;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }
 
  .leader-row {
    display: flex;
    align-items: center;
    background: #1a1010;
    border: 1px solid #3a1a1a;
    border-radius: 8px 8px 8px 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.6rem;
    transition: all 0.3s;
    cursor: pointer;
    flex-wrap: wrap;
  }
